---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homer-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homer-dashboard
  template:
    metadata:
      labels:
        app: homer-dashboard
    spec:
      containers:
        - name: homer-dashboard
          image: b4bz/homer:v26.4.2 # {"$imagepolicy": "flux-system:homer-dashboard"}
          ports:
            - name: dashboard
              containerPort: 8080
          volumeMounts:
            - name: git-repo
              mountPath: /www/assets
              subPath: repo/apps/sites/homer-dashboard/assets
              readOnly: true

        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.4.0
          env:
            - name: GITSYNC_REPO
              value: https://github.com/cleroux-dev-homelab/flux-apps.git
            - name: GITSYNC_REF
              value: main
            - name: GITSYNC_ROOT
              value: /git
            - name: GITSYNC_LINK
              value: repo
            - name: GITSYNC_DEPTH
              value: "1"
            - name: GITSYNC_PERIOD
              value: 30s
            - name: GITSYNC_SPARSE_CHECKOUT_FILE
              value: /etc/git-sync/sparse-checkout
          volumeMounts:
            - name: git-repo
              mountPath: /git
            - name: git-sync-sparse
              mountPath: /etc/git-sync
              readOnly: true
      volumes:
        - name: git-repo
          emptyDir: {}
        - name: git-sync-sparse
          configMap:
            name: homer-dashboard-git-sync
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homer-dashboard-git-sync
data:
  sparse-checkout: |
    /apps/sites/homer-dashboard/assets

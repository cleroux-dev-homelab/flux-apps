apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-books
  namespace: flux-system
spec:
  serviceAccountName: flux-apps
  interval: 1m
  retryInterval: 30s
  timeout: 30s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-apps
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: flux-runtime-info
  path: ./apps/books

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: actual-server
spec:
  interval: 1m0s
  retryInterval: 30s
  timeout: 30s
  path: components/finances/actual-server/controller/base
  wait: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: actual-server
  images:
    - name: actual-server
      newName: ghcr.io/actualbudget/actual-server # {"$imagepolicy": "actual-server:actual-server:name"}
      newTag: 24.10.1 # {"$imagepolicy": "actual-server:actual-server:tag"}

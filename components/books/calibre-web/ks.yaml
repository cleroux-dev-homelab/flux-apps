---
apiVersion: v1
kind: Namespace
metadata:
  name: calibre-web
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: calibre-web-controller
  namespace: flux-system
spec:
  targetNamespace: calibre-web
  interval: 1m
  retryInterval: 30s
  timeout: 30s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: calibre-web
  path: components/books/calibre-web/controller/envs/${ENVIRONMENT}
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: flux-runtime-info

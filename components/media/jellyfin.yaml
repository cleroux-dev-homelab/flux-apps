---
apiVersion: v1
kind: Namespace
metadata:
  name: jellyfin
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  interval: 1m0s
  url: https://github.com/cleroux-dev-homelab/jellyfin.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  targetNamespace: jellyfin
  interval: 1m0s
  retryInterval: 30s
  timeout: 30s
  path: ./kustomize
  wait: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: jellyfin

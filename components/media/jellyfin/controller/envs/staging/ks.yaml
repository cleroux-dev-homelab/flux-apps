apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jellyfin
spec:
  targetNamespace: jellyfin-system
  interval: 1m0s
  retryInterval: 30s
  timeout: 30s
  path: components/media/jellyfin/controller/base
  wait: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: jellyfin
  images:
    - name: jellyfin
      newName: ghcr.io/jellyfin/jellyfin # {"$imagepolicy": "jellyfin-system:jellyfin:name"}
      newTag: 10.10.1 # {"$imagepolicy": "jellyfin-system:jellyfin:tag"}

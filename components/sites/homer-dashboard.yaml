---
apiVersion: v1
kind: Namespace
metadata:
  name: homer-dashboard
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: homer-dashboard
  namespace: homer-dashboard
spec:
  interval: 1m0s
  url: https://github.com/cleroux-dev-homelab/homer-dashboard.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homer-dashboard
  namespace: homer-dashboard
spec:
  targetNamespace: homer-dashboard
  interval: 1m0s
  retryInterval: 30s
  timeout: 30s
  path: ./kustomize
  wait: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: homer-dashboard

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homer-dashboard-controller
  namespace: flux-system
spec:
  targetNamespace: homer-dashboard
  interval: 1m0s
  retryInterval: 30s
  timeout: 30s
  path: components/sites/homer-dashboard/controller/envs/${ENVIRONMENT}
  wait: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-apps
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: flux-runtime-info
